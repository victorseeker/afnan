<div class="bg blur1"></div>

        <p>

            Hello!

            <br><br>

            I'm Victor.

            <br><br>

            I made this little website just for you.

            <br><br>

            I simply wanted to say...

            <br><br>

            <strong>
            Nice to meet you.
            </strong>

            💕

            <br><br>

            I hope this little page brings a smile to your face.

            <br><br>

            Wishing you happiness,
            good health,
            laughter,
            and many wonderful adventures.

            ✨🌸

        </p>

    </div>

</div>

<script src="script.js"></script>
